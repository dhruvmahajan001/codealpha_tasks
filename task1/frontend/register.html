<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShopNest</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        Shop<span class="logo-accent">Nest</span>
      </a>
    </div>
  </header>

  <!-- REGISTER FORM SECTION -->
  <main class="flex-grow-1">
    <div class="container">
      <div class="form-container-card">
        <h2 class="form-title">Create Account</h2>
        <p class="form-subtitle">Register to check out fast and save your order history</p>

        <form id="register-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password (min. 6 characters)</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-full-width mt-4">
            Register Account
          </button>
        </form>

        <p class="form-footer-text">
          Already have an account? <a href="login.html">Sign In here</a>
        </p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-bottom" style="border-top: none; padding-top: 0;">
      <p>&copy; 2026 ShopNest E-Commerce. All rights reserved.</p>
      <p>CodeAlphaTask 1</p>
    </div>
  </footer>

  <!-- DEPENDENCIES & APPLICATION LOGIC SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isAuthenticated()) {
        window.location.href = 'index.html';
        return;
      }

      const registerForm = document.getElementById('register-form');
      const submitBtn = document.getElementById('submit-btn');

      if (registerForm) {
        registerForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          const name = document.getElementById('fullName').value.trim();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const confirmPassword = document.getElementById('confirmPassword').value;

          // Validations
          if (!name || !email || !password || !confirmPassword) {
            showToast('All fields are required', 'error');
            return;
          }

          if (password.length < 6) {
            showToast('Password must be at least 6 characters long', 'error');
            return;
          }

          if (password !== confirmPassword) {
            showToast('Passwords do not match', 'error');
            return;
          }

          // Show registering state
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="loading-spinner-btn"></span> Creating Account...';

          try {
            await Auth.register(name, email, password);
            showToast('Account created successfully!', 'success');

            const params = new URLSearchParams(window.location.search);
            const redirectUrl = params.get('redirect') || 'index.html';

            setTimeout(() => {
              window.location.href = redirectUrl;
            }, 1000);

          } catch (error) {
            showToast(error.message || 'Registration failed. Try a different email.', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Register Account';
          }
        });
      }
    });
  </script>
</body>
</html>
