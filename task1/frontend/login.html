<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ShopNest</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        Shop<span class="logo-accent">Nest</span>
      </a>
    </div>
  </header>

  <!-- LOGIN FORM SECTION -->
  <main class="flex-grow-1">
    <div class="container">
      <div class="form-container-card">
        <h2 class="form-title">Welcome Back</h2>
        <p class="form-subtitle">Please enter your credentials to access your account</p>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-full-width mt-4">
            Sign In
          </button>
        </form>

        <p class="form-footer-text">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-bottom" style="border-top: none; padding-top: 0;">
      <p>&copy; 2026 ShopNest E-Commerce. All rights reserved.</p>
      <p>CodeAlpha Task 1</p>
    </div>
  </footer>

  <!-- DEPENDENCIES & APPLICATION LOGIC SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Direct access check: If already logged in, redirect to index
      if (Auth.isAuthenticated()) {
        window.location.href = 'index.html';
        return;
      }

      const loginForm = document.getElementById('login-form');
      const submitBtn = document.getElementById('submit-btn');

      if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;

          if (!email || !password) {
            showToast('Please enter both email and password', 'error');
            return;
          }

          // Show signing in state
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="loading-spinner-btn"></span> Signing In...';

          try {
            await Auth.login(email, password);
            showToast('Login successful!', 'success');

            // Redirect back to referring page if applicable (e.g. checkout), otherwise home
            const params = new URLSearchParams(window.location.search);
            const redirectUrl = params.get('redirect') || 'index.html';

            setTimeout(() => {
              window.location.href = redirectUrl;
            }, 1000);

          } catch (error) {
            showToast(error.message || 'Login failed. Check your details.', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
          }
        });
      }
    });
  </script>
</body>
</html>
